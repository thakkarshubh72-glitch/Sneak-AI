services:
  # Backend Node.js Service
  - type: web
    name: sneakai-api
    env: node
    region: oregon
    buildCommand: cd BACKEND && npm install
    startCommand: cd BACKEND && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://sneakai.vercel.app # Update with actual vercel url
      - key: MONGODB_URI
        sync: false # Set in Render dashboard

  # AI FastAPI Service
  - type: web
    name: sneakai-ai
    env: python
    region: oregon
    buildCommand: cd ai-service && pip install -r requirements.txt
    startCommand: cd ai-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.8
